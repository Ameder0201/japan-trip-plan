<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trip Plan</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Segoe UI", sans-serif; font-size: 14px; background: #f7f8f5; color: #1f2933; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    button, input, select { font: inherit; }
    header { padding: 18px 20px 12px; background: #ffffff; border-bottom: 1px solid #dfe7df; }
    h1 { margin: 0 0 6px; font-size: 22px; }
    p { margin: 0; color: #58616d; line-height: 1.5; }
    .layout { display: grid; grid-template-columns: 430px 1fr; height: calc(100vh - 84px); }
    .layout.map-hidden { grid-template-columns: 1fr; height: auto; }
    #map { height: 100%; min-height: 520px; }
    .map-panel { position: relative; min-height: 0; }
    .layout.map-hidden .map-panel { display: none; }
    aside { overflow: auto; padding: 14px; background: #fbfbf8; border-right: 1px solid #dfe7df; }
    .layout.map-hidden aside { max-height: none; height: auto; border-right: 0; }
    .map-toggle { position: fixed; right: 14px; bottom: max(14px, env(safe-area-inset-bottom)); z-index: 1200; border: 1px solid #c9d8d2; background: rgba(255,255,255,0.94); color: #174c3c; border-radius: 999px; padding: 9px 12px; font-size: 13px; font-weight: 800; box-shadow: 0 8px 22px rgba(31,41,51,0.18); cursor: pointer; backdrop-filter: blur(10px); }
    .map-toggle::before { content: '▾'; display: inline-block; margin-right: 5px; font-size: 11px; }
    .layout.map-hidden + .map-toggle::before { content: '▴'; }
    .day { margin-bottom: 12px; padding: 12px; background: white; border: 1px solid #dde7df; border-radius: 8px; }
    .day h2 { margin: 0 0 6px; font-size: 15px; }
    .day-meta { margin: 0 0 8px; font-size: 12px; color: #6b7280; }
    .day-summary { margin: 0 0 10px; font-size: 13px; color: #374151; }
    .day-tools { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 10px; }
    .day-tools a { display: inline-flex; align-items: center; border: 1px solid #c9d8d2; background: #edf5f2; color: #174c3c; text-decoration: none; border-radius: 7px; padding: 6px 8px; font-size: 12px; font-weight: 700; }
    .planner-tools { margin-bottom: 12px; padding: 12px; background: #fff; border: 1px solid #e7e0d8; border-radius: 8px; }
    .planner-tools.is-hidden { display: none; }
    .manual-toggle { width: 100%; margin-bottom: 12px; border: 1px solid #c9d8d2; background: #edf5f2; color: #174c3c; border-radius: 8px; padding: 9px 10px; font-weight: 700; cursor: pointer; }
    .manual-toggle.is-hidden { display: none; }
    .planner-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .planner-tools h2 { margin: 0 0 8px; font-size: 15px; }
    .planner-head h2 { margin: 0; }
    .planner-tools p { font-size: 12px; }
    .add-grid { display: grid; grid-template-columns: 74px 1fr; gap: 7px; margin-top: 10px; }
    .add-grid label { font-size: 12px; color: #6b7280; align-self: center; }
    .add-grid input, .add-grid select { min-width: 0; border: 1px solid #d8d0c8; border-radius: 7px; padding: 7px; background: #fff; color: #1f2933; }
    .add-actions { display: flex; gap: 8px; margin-top: 9px; }
    .add-actions button { border: 1px solid #c9d8d2; background: #edf5f2; color: #174c3c; border-radius: 7px; padding: 7px 9px; font-weight: 700; cursor: pointer; }
    .tool-button { border: 1px solid #d8d0c8; background: #fff; color: #374151; border-radius: 7px; padding: 6px 8px; font-weight: 700; cursor: pointer; }
    .route-list { list-style: none; padding: 0; margin: 0; }
    .route-step { display: grid; grid-template-columns: 62px 1fr; gap: 8px; padding: 7px 0; border-top: 1px solid #eee7df; }
    .route-step.is-selected { background: #fff7e6; border-left: 3px solid #d97706; padding-left: 7px; }
    .route-time { color: #6b7280; font-size: 12px; line-height: 1.35; }
    .route-main { min-width: 0; }
    .place { display: block; width: 100%; text-align: left; border: 0; background: #f0f5f3; border-radius: 7px; padding: 8px 9px; margin: 0 0 4px; cursor: pointer; color: #1f2933; font-family: inherit; font-size: 13px; font-weight: 750; line-height: 1.35; }
    .place.ghost { background: #f7f4ef; cursor: default; }
    a.place { text-decoration: none; box-sizing: border-box; }
    .option-group { display: grid; gap: 5px; }
    .place small { display: block; color: #6b7280; margin-top: 3px; font-size: 12px; font-weight: 600; }
    .reserve-chip { display: inline-flex; align-items: center; margin-left: 6px; padding: 2px 6px; border-radius: 999px; background: #fef3c7; color: #92400e; font-size: 11px; font-weight: 700; vertical-align: middle; }
    .reserve-chip.required { background: #fee2e2; color: #991b1b; }
    .reserve-chip.available { background: #e0f2fe; color: #075985; }
    .reservation-box { margin-top: 8px; padding: 8px; border: 1px solid #efd39c; border-radius: 7px; background: #fffaf0; color: #744210; font-size: 12px; line-height: 1.45; }

    .restore-link { border: 0; background: transparent; color: #2563eb; padding: 0; cursor: pointer; font: inherit; font-weight: 700; }
    .target-status { margin: 8px 0 0; padding: 7px 8px; background: #fff7e6; border: 1px solid #efd39c; border-radius: 7px; color: #744210; font-size: 12px; }
    .target-status.empty { background: #f7f4ef; border-color: #e7e0d8; color: #6b7280; }
    .step-note { margin-top: 4px; font-size: 12px; color: #58616d; line-height: 1.45; }
    .step-note summary { cursor: pointer; color: #6b7280; }
    .step-note div { margin-top: 4px; }
    .inline-hint { margin-top: 4px; font-size: 12px; color: #68737d; line-height: 1.45; }
    .detail-card { margin: 5px 0 0; border: 1px solid #e5e7eb; border-radius: 7px; background: #fcfcfb; }
    .detail-card summary { cursor: pointer; padding: 6px 8px; color: #374151; font-size: 12px; line-height: 1.35; font-weight: 700; }
    .detail-grid { padding: 0 8px 8px; display: grid; gap: 5px; }
    .detail-row { display: grid; grid-template-columns: 72px 1fr; gap: 7px; padding: 6px 7px; border-radius: 6px; background: #f8fafc; font-size: 12px; line-height: 1.45; }
    .detail-row.good { background: #ecfdf5; color: #14532d; }
    .detail-row.warn { background: #fff7ed; color: #7c2d12; }
    .detail-row.risk { background: #fef2f2; color: #7f1d1d; }
    .detail-row.info { background: #eff6ff; color: #1e3a8a; }
    .detail-label { font-weight: 700; color: inherit; }
    .day-extra { margin-top: 10px; padding-top: 9px; border-top: 1px solid #eee7df; font-size: 12px; color: #4b5563; line-height: 1.5; }
    .day-extra summary { cursor: pointer; font-weight: 700; color: #374151; }
    .meal-extra[open] summary { margin-bottom: 8px; }
    .meal-plan { display: grid; gap: 7px; }
    .meal-row { display: grid; grid-template-columns: 78px 1fr; gap: 8px; padding: 8px; border: 1px solid #e7e0d8; border-radius: 7px; background: #fffdf9; }

    .meal-title { color: #1f2933; font-weight: 800; line-height: 1.35; }
    .meal-note { margin-top: 3px; color: #4b5563; }
    .meal-risk { margin-top: 5px; padding: 5px 7px; border-radius: 6px; background: #fff7ed; color: #7c2d12; }

    .candidate-note { margin: 3px 0 0; color: #6b7280; }

    .alt-list button, .custom-list button { border: 0; background: transparent; color: #2563eb; padding: 0; cursor: pointer; font: inherit; font-weight: 700; }
    .alt-list button:disabled, .custom-list button:disabled { color: #9ca3af; cursor: not-allowed; }
    .custom-list a { color: #2563eb; }
    .hotel-actions { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .hotel-actions a { display: inline-flex; align-items: center; border: 1px solid #d8d0c8; background: #fff; border-radius: 999px; padding: 4px 8px; text-decoration: none; color: #2563eb; font-size: 12px; line-height: 1; font-weight: 700; }
    .leaflet-popup-content { min-width: 220px; }
    .popup-title { font-weight: 700; margin-bottom: 6px; }
    .popup-links a { display: inline-block; margin: 7px 8px 0 0; color: #2563eb; }
    .popup-links .gmap-link { font-weight: 700; }

  </style>

    }
    function setSelectedTarget(dayId, index) {
      selectedTarget = { dayId, index };
      const daySelect = document.getElementById('custom-day');
      if (daySelect) daySelect.value = dayId;
      updateSelectedTargetUI();
    }
    function setRouteOverride(dayId, index, nextLabel, note) {
      const items = loadRouteOverrides();
      items[dayId + ':' + index] = { label: nextLabel, note, updatedAt: new Date().toISOString() };
      saveRouteOverrides(items);
    }
    function clearRouteOverride(dayId, index) {
      const items = loadRouteOverrides();
      delete items[dayId + ':' + index];
      saveRouteOverrides(items);
    }
    function googleMapsSearchUrl(query) {
      return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(query);
    }
    function selectedDay() {
      const id = document.getElementById('custom-day')?.value || days[0].id;
      return days.find((day) => day.id === id) || days[0];
    }
    function googleRecommendQuery() {
      const day = selectedDay();
      const name = document.getElementById('custom-name')?.value.trim() || '';
      const note = document.getElementById('custom-note')?.value.trim() || '';
      const kind = document.getElementById('custom-kind')?.value || 'restaurants';
      const kindText = {
        restaurants: 'restaurants',
        coffee: 'coffee shop',
        dessert: 'dessert cafe',
        halal: 'halal arabic restaurant',
        hotel: 'hotel',
        spot: 'things to do',
        shopping: 'shopping'
      }[kind] || kind;
      return [day.area, name || kindText, note].filter(Boolean).join(' ');
    }
    function googleMapsInfoFromUrl(value) {
      const raw = String(value || '').trim();
      if (!raw) return { name: '', lat: '', lng: '', reason: '请先粘贴 Google Maps 链接。' };
      if (/maps\.app\.goo\.gl|goo\.gl\/maps/.test(raw)) {
        return { name: '', lat: '', lng: '', reason: '短链接无法在静态页内解析；请在浏览器打开后复制完整 Google Maps 地址，或把链接发给我核验。' };
      }
      let decoded = raw;
      try { decoded = decodeURIComponent(raw); } catch {}
      let name = '';
      const placeMatch = decoded.match(/\/place\/([^/@?]+)/);
      if (placeMatch) name = placeMatch[1].replace(/\+/g, ' ').trim();
      try {
        const url = new URL(raw);
        const queryName = url.searchParams.get('query') || url.searchParams.get('q') || url.searchParams.get('destination');
        if (!name && queryName) name = queryName.trim();
      } catch {}
      const atMatch = decoded.match(/@(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)/);
      const bangMatch = decoded.match(/!3d(-?\d+(?:\.\d+)?)!4d(-?\d+(?:\.\d+)?)/);
      const coords = atMatch || bangMatch;
      return {
        name: name,
        lat: coords ? coords[1] : '',
        lng: coords ? coords[2] : '',
        reason: name ? '已从链接识别名称。评分、营业时间和评论仍需后续联网核验。' : '未能从链接识别名称；可手动填写名称后保存。'
      };
    }
    function kindLabel(kind) {
      return ({
        restaurants: '餐厅',
        coffee: '咖啡',
        dessert: '甜品',
        halal: '阿拉伯/清真',
        hotel: '酒店',
        spot: '景点',
        shopping: '购物'
      })[kind] || '候选';
    }
    function reserveChipHtml(entry) {
      if (!entry?.reservationLevel) return '';
      return '<span class="' + reserveChipClass(entry) + '">' + entry.reservationLevel + '</span>';
    }
    function detailRow(label, value, cls) {
      if (!value) return '';
      return '<div class="detail-row ' + (cls || '') + '"><div class="detail-label">' + label + '</div><div>' + escapeHtml(value) + '</div></div>';
    }
    function entryDetailHtml(entry) {
      if (!entry || (!entry.address && !entry.hours && !entry.recommends && !entry.pros && !entry.warning)) return '';
      const rows = [
        detailRow('名称区域', [entry.name, entry.area].filter(Boolean).join('｜'), 'info'),
        detailRow('交通方式', entry.station, 'info'),
        detailRow('地址', entry.address, 'info'),
        detailRow('适合时段', entry.time, ''),
        detailRow('营业时间', entry.hours, ''),
        detailRow('关于预约', entry.reservation, entry.reservationLevel === '必须预约' ? 'risk' : entry.reservationLevel ? 'warn' : ''),
        detailRow('人均价格', entry.budget, ''),
        detailRow('推荐体验', entry.recommends, 'good'),
        detailRow('排队情况', entry.queue, /排队|等位|长等|热门|满座/.test(entry.queue || '') ? 'warn' : ''),
        detailRow('交通便利', entry.convenience, ''),
        detailRow('情侣适配', entry.couple, 'good'),
        detailRow('优点', entry.pros, 'good'),
        detailRow('缺点', entry.cons, 'warn'),
        detailRow('避雷点', entry.warning, 'risk'),
        detailRow('筛选结论', [entry.decision, entry.confidence ? '可信度：' + entry.confidence : ''].filter(Boolean).join('；'), 'info'),
      ].filter(Boolean).join('');
      return '<details class="detail-card"><summary>点点式信息</summary><div class="detail-grid">' + rows + '</div></details>';
    }
    function mealPlanHtml(day) {
      const items = Array.isArray(day.mealPlan) ? day.mealPlan : [];
      if (!items.length) {
        return '<div class="meal-summary"><strong>餐饮：</strong>' + escapeHtml(day.meals) +
          (day.fallback ? '<br><strong>替换/降级：</strong>' + escapeHtml(day.fallback) : '') + '</div>';
      }
      const rows = items.map((item) =>
        '<div class="meal-row">' +
          '<div class="meal-slot">' + escapeHtml(item.slot || '餐饮') + '</div>' +
          '<div class="meal-body">' +
            '<div class="meal-title">' + escapeHtml(item.title || '未知') + '</div>' +
            (item.note ? '<div class="meal-note">' + escapeHtml(item.note) + '</div>' : '') +
            (item.risk ? '<div class="meal-risk">' + escapeHtml(item.risk) + '</div>' : '') +
          '</div>' +
        '</div>'
      ).join('');
      return '<div class="meal-plan">' + rows +
        (day.fallback ? '<div class="meal-fallback"><strong>替换/降级：</strong>' + escapeHtml(day.fallback) + '</div>' : '') +
        '</div>';
    }
    function candidateSearchText(item) {
      return [item.name, item.note].filter(Boolean).join(' ');
    }
    function nearbyHotelLinks(item) {
      const base = item.gmap ? item.name : candidateSearchText(item);
      const queries = [
        ['附近餐厅', 'restaurants near ' + base],
        ['附近咖啡', 'coffee near ' + base],
        ['附近甜品', 'dessert near ' + base],
        ['附近便利店', 'convenience store near ' + base],
        ['附近景点', 'things to do near ' + base],
      ];
      return '<div class="hotel-actions">' + queries.map(([label, query]) =>
        '<a target="_self" href="' + googleMapsSearchUrl(query) + '">' + label + '</a>'
      ).join('') + '</div>';
    }
    function dayReservationEntries(day) {
      const found = new Map();
      day.route.forEach((step, index) => {
        const label = getOverride(day.id, index)?.label || step.label;
        for (const entry of resolveEntries(label)) {
          if (entry.reservationLevel) found.set(entry.name, entry);
        }
      });
      return [...found.values()];
    }
    function resolveEntries(label) {
      const exact = entries.find((item) => item.name === label);
      if (exact) return [exact];
      return label
        .split(/\s*\/\s*/)
        .map((part) => entries.find((item) => item.name === part.trim()))
        .filter(Boolean);
    }
    function createPlaceButton(entry) {
      const button = document.createElement('button');
      button.className = 'place';
      button.innerHTML = escapeHtml(entry.name) + reserveChipHtml(entry) + '<small>' + escapeHtml(entry.type) + '｜' + escapeHtml(entry.category) + '</small>';
      button.addEventListener('click', () => {
        map.setView([entry.lat, entry.lng], 14);
        markers.get(entry.name).openPopup();
      });
      return button;
    }
    function createPlaceBlock(entry) {
      const wrap = document.createElement('div');
      wrap.appendChild(createPlaceButton(entry));
      const detail = entryDetailHtml(entry);
      if (detail) {
        const holder = document.createElement('div');
        holder.innerHTML = detail;
        wrap.appendChild(holder.firstElementChild);
      }
      return wrap;
    }
    function findCustomCandidate(dayId, name) {
      return loadCustomCandidates().find((item) => item.day === dayId && item.name === name);
    }
    function createCustomPlaceLink(item) {
      const wrap = document.createElement('div');
      const link = document.createElement('a');
      link.className = 'place';
      link.target = '_self';
      link.href = item.gmap || googleMapsSearchUrl(item.name);
      link.innerHTML = escapeHtml(item.name) + '<span class="kind-chip' + (item.kind === 'hotel' ? ' hotel' : '') + '">' + kindLabel(item.kind) + '</span><small>手动候选｜Google Maps</small>';
      wrap.appendChild(link);
      if (item.kind === 'hotel') {
        const actions = document.createElement('div');
        actions.innerHTML = nearbyHotelLinks(item);
        wrap.appendChild(actions.firstElementChild);
      }
      return wrap;
    }
    function replaceDayStep(day, item, nextLabel) {
      if (!selectedTarget || selectedTarget.dayId !== day.id) return;
      const index = selectedTarget.index;
      setRouteOverride(day.id, index, nextLabel, item.note || '备选池替换');
      renderDays();
      selectedTarget = { dayId: day.id, index };
      updateSelectedTargetUI();
      const entry = entries.find((place) => place.name === nextLabel);
      if (entry && markers.has(entry.name)) {
        map.setView([entry.lat, entry.lng], 14);
        markers.get(entry.name).openPopup();
      }
    }
    function renderCustomCandidates() {
      for (const list of document.querySelectorAll('[data-custom-day]')) {
        const dayId = list.getAttribute('data-custom-day');
        const items = loadCustomCandidates().filter((item) => item.day === dayId);
        list.innerHTML = '';
        items.forEach((item, index) => {
          const li = document.createElement('li');
          const href = item.gmap || googleMapsSearchUrl(item.name);
          li.innerHTML =
            '<span class="kind-chip' + (item.kind === 'hotel' ? ' hotel' : '') + '">' + kindLabel(item.kind) + '</span>' +
            '<a target="_self" href="' + escapeHtml(href) + '">' + escapeHtml(item.name) + '</a>' +
            ' <button type="button" data-needs-target="' + dayId + '" data-custom-replace="' + index + '">替换选中项</button>' +
            (item.note ? '<details class="candidate-note"><summary>备注</summary><div>' + escapeHtml(item.note) + '</div></details>' : '') +
            (item.kind === 'hotel' ? nearbyHotelLinks(item) : '');
          list.appendChild(li);
        });
        for (const btn of list.querySelectorAll('button[data-custom-replace]')) {
          btn.addEventListener('click', () => {
            const currentItems = loadCustomCandidates().filter((item) => item.day === dayId);
            const item = currentItems[Number(btn.getAttribute('data-custom-replace'))];
            const day = days.find((d) => d.id === dayId);
            if (!item || !day || !selectedTarget || selectedTarget.dayId !== day.id) return;
            const index = selectedTarget.index;
            setRouteOverride(day.id, index, item.name, item.note || '手动新增候选');
            renderDays();
            selectedTarget = { dayId: day.id, index };
            updateSelectedTargetUI();
          });
        }
      }
    }
    const showManual = document.createElement('button');
    showManual.className = 'manual-toggle';
    showManual.type = 'button';
    showManual.textContent = '显示手动添加页面';
    timeline.appendChild(showManual);
    const tools = document.createElement('section');
    tools.className = 'planner-tools';
    tools.innerHTML =
      '<div class="planner-head"><h2>后续新增候选</h2><button class="tool-button" id="manual-hide" type="button">隐藏</button></div>' +
      '<p>这里保存的是当前浏览器里的临时备选。你之后给我小红书/Google Maps 推荐时，我会把它们写回脚本并重新规划 HTML。</p>' +
      '<div class="add-grid">' +
      '<label>天数</label><select id="custom-day">' + days.map((day) => '<option value="' + day.id + '">' + day.id + '</option>').join('') + '</select>' +
      '<label>类型</label><select id="custom-kind"><option value="restaurants">餐厅</option><option value="coffee">咖啡</option><option value="dessert">甜品</option><option value="halal">阿拉伯/清真</option><option value="hotel">酒店</option><option value="spot">景点/体验</option><option value="shopping">购物</option></select>' +
      '<label>名称</label><input id="custom-name" placeholder="店铺/景点名">' +
      '<label>备注</label><input id="custom-note" placeholder="偏好、价格、区域或适合哪一餐">' +
      '<label>地图</label><input id="custom-gmap" placeholder="Google Maps 链接，可留空">' +
      '</div>' +
      '<p id="custom-link-status" class="candidate-note"></p>' +
      '<div class="add-actions"><button id="custom-save" type="button">保存候选</button><button id="custom-detect" type="button">识别地图链接</button><button id="custom-google" type="button">Google推荐</button><button id="route-clear" type="button">清空路线替换</button><button id="custom-clear" type="button">清空临时候选</button></div>';
    timeline.appendChild(tools);
    function updateManualVisibility() {
      const hidden = localStorage.getItem(manualHiddenKey) === '1';
      tools.classList.toggle('is-hidden', hidden);
      showManual.classList.toggle('is-hidden', !hidden);
    }
    document.getElementById('manual-hide').addEventListener('click', () => {
      localStorage.setItem(manualHiddenKey, '1');
      updateManualVisibility();
    });
    showManual.addEventListener('click', () => {
      localStorage.setItem(manualHiddenKey, '0');
      updateManualVisibility();
    });
    updateManualVisibility();
    document.getElementById('custom-save').addEventListener('click', () => {
      const day = document.getElementById('custom-day').value;
      let name = document.getElementById('custom-name').value.trim();
      const note = document.getElementById('custom-note').value.trim();
      const gmap = document.getElementById('custom-gmap').value.trim();
      const kind = document.getElementById('custom-kind').value;
      const parsed = googleMapsInfoFromUrl(gmap);
      if (!name && parsed.name) name = parsed.name;
      if (!name) return;
      const items = loadCustomCandidates();
      items.push({ day, kind, name, note, gmap, lat: parsed.lat, lng: parsed.lng, createdAt: new Date().toISOString() });
      saveCustomCandidates(items);
      document.getElementById('custom-name').value = '';
      document.getElementById('custom-note').value = '';
      document.getElementById('custom-gmap').value = '';
      document.getElementById('custom-link-status').textContent = '';
      renderCustomCandidates();
      updateSelectedTargetUI();
    });
    document.getElementById('custom-google').addEventListener('click', () => {
      window.location.href = googleMapsSearchUrl(googleRecommendQuery());
    });
    document.getElementById('custom-detect').addEventListener('click', () => {
      const info = googleMapsInfoFromUrl(document.getElementById('custom-gmap').value);
      if (info.name && !document.getElementById('custom-name').value.trim()) {
        document.getElementById('custom-name').value = info.name;
      }
      document.getElementById('custom-link-status').textContent =
        info.reason + (info.lat && info.lng ? ' 坐标：' + info.lat + ', ' + info.lng : '');
    });
    document.getElementById('custom-gmap').addEventListener('change', () => {
      const info = googleMapsInfoFromUrl(document.getElementById('custom-gmap').value);
      if (info.name && !document.getElementById('custom-name').value.trim()) {
        document.getElementById('custom-name').value = info.name;
        document.getElementById('custom-link-status').textContent = info.reason;
      }
    });
    document.getElementById('route-clear').addEventListener('click', () => {
      localStorage.removeItem(routeOverrideKey);
      selectedTarget = null;
      renderDays();
    });
    document.getElementById('custom-clear').addEventListener('click', () => {
      saveCustomCandidates([]);
      renderCustomCandidates();
      updateSelectedTargetUI();
    });
    const daysWrap = document.createElement('div');
    timeline.appendChild(daysWrap);
    function renderDays() {
      daysWrap.innerHTML = '';
      for (const day of days) {
        const card = document.createElement('section');
        card.className = 'day';
        card.innerHTML =
          '<h2>' + day.id + '｜' + day.title + '</h2>' +
          '<p class="day-meta">' + day.area + '</p>' +
          '<p class="day-summary">' + day.summary + '</p>' +
          '<div class="day-tools"><a target="_self" rel="noopener" href="' + day.gmap + '">打开当日路线</a></div>' +
          '<div class="target-status empty" data-target-status="' + day.id + '">先点击上方日程中的某一项，再从备选池选择替换。</div>';
        const reserveItems = dayReservationEntries(day);
        if (reserveItems.length) {
          const reserve = document.createElement('div');
          reserve.className = 'reservation-box';
          reserve.innerHTML = '<strong>预约提醒：</strong>' + reserveItems.map((entry) =>
            '<div>' + reserveChipHtml(entry) + ' ' + escapeHtml(entry.name) + '：' + escapeHtml(entry.reservation) + '</div>'
          ).join('');
          card.appendChild(reserve);
        }
        const list = document.createElement('ol');
        list.className = 'route-list';
        day.route.forEach((step, stepIndex) => {
          const override = getOverride(day.id, stepIndex);
          const label = override?.label || step.label;
          const matchedEntries = resolveEntries(label);
          const customCandidate = findCustomCandidate(day.id, label);
          const row = document.createElement('li');
          row.className = 'route-step';
          row.setAttribute('data-route-key', day.id + ':' + stepIndex);
          row.innerHTML = '<div class="route-time">' + step.time + '</div><div class="route-main"></div>';
          row.addEventListener('click', () => setSelectedTarget(day.id, stepIndex));
          const main = row.querySelector('.route-main');
          if (matchedEntries.length) {
            const group = document.createElement('div');
            group.className = 'option-group';
            for (const entry of matchedEntries) group.appendChild(createPlaceBlock(entry));
            main.appendChild(group);
          } else if (customCandidate) {
            main.appendChild(createCustomPlaceLink(customCandidate));
          } else {
            const button = document.createElement('button');
            button.className = 'place ghost';
            button.innerHTML = escapeHtml(label) + '<small>未定位项目｜按当天现场调整</small>';
            button.disabled = true;
            main.appendChild(button);
          }
          const noteText = override?.note || step.note;
          if (noteText) {
            const note = document.createElement('div');
            note.className = 'inline-hint';
            note.textContent = noteText;
            main.appendChild(note);
          }
          if (override) {
            const replaced = document.createElement('div');
            replaced.className = 'replaced-note';
            replaced.innerHTML = '已替换原计划：' + escapeHtml(step.label) + ' <button class="restore-link" type="button">恢复</button>';
            replaced.querySelector('button').addEventListener('click', () => {
              clearRouteOverride(day.id, stepIndex);
              renderDays();
            });
            main.appendChild(replaced);
          }
          list.appendChild(row);
        });
        card.appendChild(list);
        const extra = document.createElement('details');
        extra.className = 'day-extra meal-extra';
        extra.open = true;
        extra.innerHTML = '<summary>餐饮安排</summary>' + mealPlanHtml(day);
        card.appendChild(extra);
        if (day.alternatives && day.alternatives.length) {
          const alt = document.createElement('details');
          alt.className = 'day-extra';
          const altList = document.createElement('ul');
          altList.className = 'alt-list';
          for (const item of day.alternatives) {
            const li = document.createElement('li');
            const matched = resolveEntries(item.label);
            if (matched.length) {
              const buttons = document.createElement('span');
              matched.forEach((entry, entryIndex) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.setAttribute('data-needs-target', day.id);
                btn.textContent = matched.length > 1 ? '替换为 ' + entry.name : item.label;
                btn.addEventListener('click', () => replaceDayStep(day, item, entry.name));
                buttons.appendChild(btn);
                if (entryIndex < matched.length - 1) buttons.appendChild(document.createTextNode(' / '));
              });
              li.appendChild(buttons);
              if (item.note) {
                const detail = document.createElement('details');
                detail.className = 'candidate-note';
                detail.innerHTML = '<summary>备注</summary><div>' + escapeHtml(item.note) + '</div>';
                li.appendChild(detail);
              }
            } else {
              li.innerHTML = '<strong>' + escapeHtml(item.label) + '</strong>' +
                (item.note ? '<details class="candidate-note"><summary>备注</summary><div>' + escapeHtml(item.note) + '</div></details>' : '');
            }
            altList.appendChild(li);
          }
          alt.innerHTML = '<summary>备选池</summary>';
          alt.appendChild(altList);
          card.appendChild(alt);
        }
        const custom = document.createElement('details');
        custom.className = 'day-extra';
        custom.innerHTML = '<summary>我的新增候选</summary><ul class="custom-list" data-custom-day="' + day.id + '"></ul>';
        card.appendChild(custom);
        daysWrap.appendChild(card);
      }
      renderCustomCandidates();
      updateSelectedTargetUI();
    }
    renderDays();
  </script>
</body>
</html>
